name: Update profile age

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-age:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update age badge
        env:
          BIRTH_MONTH: "10"
          BIRTH_YEAR: "1991"
        run: |
          python - <<'PY'
          import datetime
          import re
          from pathlib import Path

          birth_month = int(__import__("os").environ["BIRTH_MONTH"])
          birth_year = int(__import__("os").environ["BIRTH_YEAR"])
          today = datetime.date.today()
          age = today.year - birth_year - (today.month < birth_month)

          readme = Path("README.md")
          content = readme.read_text(encoding="utf-8")
          replacement = (
              "<!-- AGE_BADGE:start -->\n"
              f"  <img src=\"https://img.shields.io/badge/Idade-{age}-blue\" alt=\"Idade atualizada automaticamente\" />\n"
              "  <!-- AGE_BADGE:end -->"
          )
          updated = re.sub(
              r"<!-- AGE_BADGE:start -->.*?<!-- AGE_BADGE:end -->",
              replacement,
              content,
              flags=re.DOTALL,
          )
          readme.write_text(updated, encoding="utf-8")
          PY

      - name: Commit changes when needed
        run: |
          if git diff --quiet README.md; then
            echo "Age badge already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile age badge"
          git push
